# ============================================================================
# Telegraf config — AX42 host metrics → InfluxDB
# ============================================================================
# Scrape interval: 60s. One point per metric per minute keeps the InfluxDB
# bucket small (~100 MB steady state with 60d retention). Flush jitter
# prevents all points landing at the same instant.
# ============================================================================

[agent]
  interval = "60s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "60s"
  flush_jitter = "5s"
  precision = "1s"
  hostname = "ax42"
  omit_hostname = false

# ------------------------- Host metrics -----------------------------------

# CPU usage (aggregate across all cores)
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false
  report_active = true
  fieldpass = ["usage_user", "usage_system", "usage_idle", "usage_iowait", "usage_active"]

# Memory
[[inputs.mem]]
  fieldpass = ["used_percent", "used", "total", "available", "cached", "buffered", "free"]

# Load average + uptime + n_cpus (used by the "load vs n_cpus" alert)
[[inputs.system]]
  fieldpass = ["load1", "load5", "load15", "n_cpus", "uptime"]

# Disk usage per mount point. `/` covers the root, `/data` covers the Coolify
# data directory where InfluxDB and Grafana volumes live.
[[inputs.disk]]
  mount_points = ["/", "/data"]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs", "nsfs"]
  fieldpass = ["used_percent", "used", "total", "free"]

# Block device I/O
[[inputs.diskio]]
  fieldpass = ["read_bytes", "write_bytes", "reads", "writes", "io_time"]

# Network
[[inputs.net]]
  interfaces = ["eth0", "eno1", "enp*"]
  ignore_protocol_stats = true
  fieldpass = ["bytes_sent", "bytes_recv", "err_in", "err_out", "drop_in", "drop_out"]

# Hardware sensors — Ryzen CPU temperature (Tctl) + chipset temps.
# Requires `lm-sensors` on the host and `sensors-detect --auto` to have been
# run once. Reads from /sys via the mounted /host/sys volume.
[[inputs.sensors]]
  remove_numbers = true
  timeout = "5s"

# ------------------------- Docker metrics ---------------------------------

# Per-container CPU/memory/IO. Especially useful on Coolify — lets us see
# which container is eating the box (Medusa, Meilisearch, Postgres, etc.)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  source_tag = false
  container_name_include = []
  container_state_include = ["running"]
  perdevice = false
  total = true
  timeout = "5s"
  # Only the fields we actually chart — skip the noisy per-network/per-disk
  # breakdowns that would blow up the bucket.
  fieldpass = [
    "n_containers_running",
    "n_containers_stopped",
    "n_containers_paused",
    "usage_percent",
    "usage",
    "limit",
    "rx_bytes",
    "tx_bytes",
  ]
  # Trim docker labels that would otherwise become high-cardinality tags
  docker_label_exclude = ["coolify.*", "com.docker.*", "org.opencontainers.*"]

# ------------------------- Output ------------------------------------------

[[outputs.influxdb_v2]]
  urls = ["${INFLUX_URL}"]
  token = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket = "${INFLUX_BUCKET}"
  timeout = "10s"
