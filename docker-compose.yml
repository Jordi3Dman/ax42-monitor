#
# Server Health Monitoring stack (Telegraf + InfluxDB + Grafana + ntfy)
# Deployed via Coolify on the AX42 Hetzner server.
#
# Services:
#   - influxdb  → stores metrics (60d TTL)
#   - telegraf  → scrapes host metrics every 60s, writes to influxdb
#   - grafana   → renders dashboards + evaluates alert rules
#                 exposed publicly at metrics.fournico.com
#   - ntfy      → receives Grafana alert webhooks, pushes to Android
#                 exposed publicly at ntfy.fournico.com
#
# See README.md for the full setup walkthrough.
#

services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    # InfluxDB 2.x self-bootstraps from these env vars on first boot, so we
    # don't have to manually create an admin token via the UI. See:
    # https://docs.influxdata.com/influxdb/v2/install/use-docker-compose/
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_ADMIN_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-fournico}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-server_health}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION:-60d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    volumes:
      # Persistent data — survives Coolify service restarts
      - /data/monitoring/influxdb:/var/lib/influxdb2
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  telegraf:
    image: telegraf:1.30
    restart: unless-stopped
    user: telegraf:${DOCKER_GID:-999}
    # Telegraf uses the same admin token as InfluxDB so there's no separate
    # token management step. Good enough for a single-host setup.
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-fournico}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-server_health}
      HOST_PROC: /host/proc
      HOST_SYS: /host/sys
      HOST_ETC: /host/etc
      HOST_MOUNT_PREFIX: /rootfs
    volumes:
      # Telegraf config — mount the whole directory (not the single file)
      # so Coolify's deploy flow doesn't accidentally auto-create a
      # directory at the file path. Telegraf reads /etc/telegraf/telegraf.conf
      # by default, which now comes from the host's telegraf/telegraf.conf.
      - ./telegraf:/etc/telegraf:ro
      # Host metrics (read-only)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc:/host/etc:ro
      - /:/rootfs:ro
      # Docker metrics — Telegraf needs to read the Docker socket to list
      # running containers and their CPU/memory stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.7
    restart: unless-stopped
    # Grafana auto-provisions the InfluxDB datasource, dashboards, contact
    # point and alert rules from the mounted config folders below. All
    # environment-specific values (admin password, ntfy URL, Influx token)
    # are injected via env vars.
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN:-metrics.fournico.com}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://metrics.fournico.com}
      # Iframe embedding in Stitchflow — required for the Server > Health page
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Disable Grafana's own telemetry — we don't need it phoning home
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Injected into provisioned datasource / alerting / rules
      INFLUX_TOKEN: ${INFLUX_TOKEN}
      INFLUX_ORG: ${INFLUX_ORG:-fournico}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-server_health}
      NTFY_WEBHOOK_URL: ${NTFY_WEBHOOK_URL}
    volumes:
      - /data/monitoring/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - monitoring
    # Coolify attaches its Traefik ingress here — expose port 3000 internally
    expose:
      - "3000"

  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    restart: unless-stopped
    command:
      - serve
    environment:
      # Public base URL — must match the domain Coolify exposes
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.fournico.com}
      # ntfy is behind Coolify's Traefik (TLS terminated by Traefik)
      NTFY_BEHIND_PROXY: "true"
      NTFY_LISTEN_HTTP: ":80"
      # Cache messages for 12h so late subscribers can still get them
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: "12h"
      # Attachment storage (disabled — we only use text notifications)
      NTFY_ATTACHMENT_CACHE_DIR: ""
      # Auth database — if you later want to require login for publish/subscribe,
      # set NTFY_AUTH_DEFAULT_ACCESS=deny-all and add users via `ntfy user add`
      NTFY_AUTH_FILE: /var/lib/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: ${NTFY_AUTH_DEFAULT_ACCESS:-read-write}
      # Disable telemetry
      NTFY_ENABLE_SIGNUP: "false"
      NTFY_ENABLE_LOGIN: "true"
      NTFY_ENABLE_RESERVATIONS: "true"
    volumes:
      - /data/monitoring/ntfy/cache:/var/cache/ntfy
      - /data/monitoring/ntfy/lib:/var/lib/ntfy
    networks:
      - monitoring
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  monitoring:
    driver: bridge
