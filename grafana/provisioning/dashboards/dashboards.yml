#
# Grafana dashboard provisioning — scans /var/lib/grafana/dashboards on boot
# and imports any JSON dashboard files it finds. The "Server Health" dashboard
# is loaded from grafana/dashboards/server-health.json.
#
apiVersion: 1

providers:
  - name: Fournico
    orgId: 1
    folder: ""
    folderUid: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
